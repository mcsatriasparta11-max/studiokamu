<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Studio Kamu</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app-background"></div>

<div class="app-overlay"></div>

<div class="theme-toggle">
    🌙
</div>

<!-- ===========================
     LANDING PAGE
=========================== -->

<section id="landingPage">

    <div class="landing-content">

        <img
            src="assets/logo.png"
            class="landing-logo">

        <h1 class="landing-title">

            <span>STUDIO</span>

            <span class="orange">KAMU</span>

        </h1>

        <p class="landing-subtitle">

            Self Photo Studio Padang

        </p>

        <button id="startButton">

            📷 MULAI

        </button>

        <div class="landing-menu">

            <button id="galleryButton">

                🖼 Galeri Saya

            </button>

            <button id="historyButton">

                🕘 Riwayat

            </button>

        </div>

        <div class="landing-footer">

            <p>

                Abadikan Momen Terbaikmu

            </p>

            <span>

                Versi 1.0

            </span>

        </div>

    </div>

</section>

<!-- ===========================
     HOME PAGE
=========================== -->

<section id="homePage">

    <header class="header">

        <h1>Candid Picture</h1>

        <p>Pilih Template Photostrip</p>

    </header>

    <!-- Template otomatis -->

    <div id="templateList">

    </div>

</section>



<!-- ===========================
     EDITOR PAGE
============================ -->

<section id="editorPage">

    <header class="header">

        <h2 id="templateTitle">
            Template
        </h2>

    </header>

    <div class="canvas-wrapper">

        <canvas id="editorCanvas"></canvas>

    </div>

    <div class="toolbar">

        <button id="backButton" class="secondary-btn">
            ← Kembali
        </button>

        <button id="saveButton">
            💾 Simpan
        </button>

    </div>

</section>

<input
    type="file"
    id="photoInput"
    accept="image/*"
    hidden>



    <!-- ===========================
         JAVASCRIPT
    ============================ -->

<script src="js/templates.js"></script>
<script src="js/editor.js"></script>
<script src="js/export.js"></script>
<script src="js/app.js"></script>

</body>

</html>
